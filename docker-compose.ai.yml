services:
  prediction:
    build:
      context: ./prediction
      dockerfile: Dockerfile
    container_name: prediction-service
    restart: unless-stopped
    ports:
      - "7500:7500"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7500/').read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  default:
    name: huilerie-ai-network
