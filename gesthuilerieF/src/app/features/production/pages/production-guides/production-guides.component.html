<nb-card>
  <nb-card-header>Exécution des Guides de Production</nb-card-header>
  <nb-card-body>
    <div class="step" *ngFor="let s of steps">
      <div>
        <div class="name">{{ s.step }}</div>
        <div class="desc">{{ s.desc }}</div>
      </div>
      <span class="status">{{ s.status }}</span>
    </div>
  </nb-card-body>
</nb-card>
