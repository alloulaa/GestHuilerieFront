<mat-card class="olive-card">
  <mat-card-header>
    <mat-card-title>Stock - Mouvements et historique</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="actions">
      <a mat-raised-button color="primary" [routerLink]="['/pages/stock/form']">Nouveau mouvement</a>
    </div>

    <div class="filter-bar">
      <input type="number" [(ngModel)]="lotIdFilter" name="lotIdFilter" placeholder="Filtrer par Lot ID" />
      <button mat-raised-button color="primary" type="button" (click)="filterByLotId()">Filtrer</button>
      <button mat-stroked-button type="button" (click)="resetLotFilter()">Reset</button>
    </div>

    <p class="filter-message" *ngIf="filterMessage">{{ filterMessage }}</p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Reference</th>
            <th>Quantite</th>
            <th>Date</th>
            <th>Commentaire</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="movements.length === 0">
            <td colspan="6" class="empty-row">Aucun mouvement a afficher.</td>
          </tr>
          <tr *ngFor="let m of movements">
            <td>{{ m.id }}</td>
            <td><span class="badge" [ngClass]="movementClass(m.typeMouvement)">{{ movementLabel(m.typeMouvement)
                }}</span></td>
            <td>{{ m.referenceId }}</td>
            <td>{{ m.quantite }}</td>
            <td>{{ m.dateMouvement }}</td>
            <td>{{ m.commentaire }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </mat-card-content>
</mat-card>
