<nb-card>
  <nb-card-body>
    <div class="table-wrap">
      <table class="crud-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Type</th>
            <th>Unite</th>
            <th>Description</th>
           
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of rawMaterials">
            <td>{{ item.idMatierePremiere }}</td>
            <td>{{ item.nom }}</td>
            <td>{{ item.type }}</td>
            <td>{{ item.uniteMesure }}</td>
            <td>{{ item.description }}</td>
         
          </tr>
        </tbody>
      </table>
    </div>
  </nb-card-body>
</nb-card>
