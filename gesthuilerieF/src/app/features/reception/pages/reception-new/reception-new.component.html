<mat-card class="olive-card">
  <mat-card-header>
    <mat-card-title>Reception</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="toolbar">
      <div class="toolbar-copy">
        <p class="eyebrow">Pilotage</p>
        <h3>Historique des receptions</h3>
        <p>Consultez l'ensemble des pesees et filtrez rapidement par lot.</p>

        <div class="meta-row">
          <span class="chip">Total: {{ allPesees.length }}</span>
        </div>
      </div>

      <a class="cta-btn" mat-raised-button color="primary" [routerLink]="['/pages/reception/form']">Nouvelle
        reception</a>
    </div>
  </mat-card-content>
</mat-card>
