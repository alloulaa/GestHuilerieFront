<section class="pending-shell">
  <div class="pending-card">
    <p class="eyebrow">Acces en attente</p>
    <h1>Votre compte est actif</h1>
    <p>
      Votre inscription est bien prise en compte. Un administrateur doit encore vous attribuer des permissions
      avant d'acceder aux modules.
    </p>

    <div class="actions">
      <button type="button" class="btn-primary" (click)="refreshAccess()">Verifier mes permissions</button>
      <button type="button" class="btn-secondary" (click)="logout()">Se deconnecter</button>
    </div>
  </div>
</section>
