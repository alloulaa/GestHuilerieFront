<main class="auth-shell">
  <section class="auth-panel">
    <div class="panel-decor panel-decor-top"></div>
    <div class="panel-decor panel-decor-bottom"></div>

    <header>
      <p class="eyebrow">Réinitialisation</p>
      <h2>Nouveau mot de passe</h2>
      <p>Définissez un nouveau mot de passe pour votre compte.</p>
    </header>

    <div class="message message-error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate *ngIf="!errorMessage && token">
      <label>
        Nouveau mot de passe
        <span class="input-shell">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M7 12a5 5 0 1 1 10 0 5 5 0 0 1-10 0Z" />
              <path
                d="M12 2v4m0 12v4M4.22 4.22l2.83 2.83m5.9 5.9l2.83 2.83M2 12h4m12 0h4M4.22 19.78l2.83-2.83m5.9-5.9l2.83-2.83" />
            </svg>
          </span>
          <input type="password" formControlName="password" placeholder="Au moins 8 caractères" />
        </span>
        <span class="error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          <span *ngIf="form.get('password')?.errors?.['required']">Requis</span>
          <span *ngIf="form.get('password')?.errors?.['passwordStrength']">8 caractères min, 1 majuscule, 1
            chiffre</span>
        </span>
        <div class="strength-bar">
          <div class="strength" [style.width.%]="passwordStrength * 25" [class]="'strength-' + passwordStrength"></div>
        </div>
      </label>

      <label>
        Confirmer le mot de passe
        <span class="input-shell">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
          </span>
          <input type="password" formControlName="confirmPassword" placeholder="Confirmez" />
        </span>
        <span class="error" *ngIf="form.get('confirmPassword')?.touched && form.errors?.['passwordsMismatch']">
          Les mots de passe ne correspondent pas
        </span>
      </label>

      <button type="submit" [disabled]="isLoading || form.invalid">
        <span *ngIf="!isLoading">Réinitialiser</span>
        <span *ngIf="isLoading">Traitement...</span>
      </button>
    </form>

    <p class="switch-auth">
      <a routerLink="/login">← Retour à la connexion</a>
    </p>
  </section>
</main>
