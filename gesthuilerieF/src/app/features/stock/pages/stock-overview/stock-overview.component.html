<mat-card class="olive-card">
    <mat-card-header>
        <mat-card-title>Stock </mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <div *ngIf="isAdmin" class="filter-bar">
            <input [(ngModel)]="selectedHuilerieNom" name="selectedHuilerieNom"
                placeholder="Filtrer par nom d'huilerie" />
            <button mat-raised-button color="primary" class="filter-btn" type="button"
                (click)="applyAdminHuilerieFilter()">Filtrer
                huilerie</button>
            <button mat-stroked-button type="button" (click)="resetAdminHuilerieFilter()">Réinitialiser</button>
        </div>

        <div class="stats">
            <span class="chip">Total: {{ stocks.length }}</span>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>REFERENCE STOCK</th>
                        <th>QUANTITE DISPONIBLE</th>
                        <th>TYPE STOCK</th>
                        <th>REFERENCE LOT</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngIf="stocks.length === 0">
                        <td colspan="5" class="empty-row">Aucune donnee de stock a afficher.</td>
                    </tr>
                    <tr *ngFor="let stock of stocks" class="row-hover">
                        <td>{{ stockReference(stock) }}</td>
                        <td>{{ stock.quantiteDisponible }}</td>
                        <td>{{ stock.typeStock }}</td>
                        <td>{{ lotReference(stock) }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </mat-card-content>
</mat-card>
