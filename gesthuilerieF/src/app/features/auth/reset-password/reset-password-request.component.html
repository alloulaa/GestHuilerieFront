<main class="auth-shell">
  <section class="auth-panel">
    <div class="panel-decor panel-decor-top"></div>
    <div class="panel-decor panel-decor-bottom"></div>

    <header>
      <p class="eyebrow">Récupération</p>
      <h2>Mot de passe oublié</h2>
      <p>Entrez votre adresse email pour recevoir les instructions de réinitialisation.</p>
    </header>

    <div class="message message-success" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <div class="message message-error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <label>
        Adresse e-mail
        <span class="input-shell">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M4 7.5C4 6.672 4.672 6 5.5 6h13c.828 0 1.5.672 1.5 1.5v9c0 .828-.672 1.5-1.5 1.5h-13A1.5 1.5 0 0 1 4 16.5v-9Z" />
              <path d="m5 8 7 5 7-5" />
            </svg>
          </span>
          <input type="email" formControlName="email" placeholder="contact@huilerie.com" />
        </span>
        <span class="error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Email invalide
        </span>
      </label>

      <button type="submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Envoyer le lien</span>
        <span *ngIf="isLoading">Envoi en cours...</span>
      </button>
    </form>

    <p class="switch-auth">
      <a routerLink="/login">← Retour à la connexion</a>
    </p>
  </section>
</main>
